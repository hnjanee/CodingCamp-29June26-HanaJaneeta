<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main>

        <header class="widget greeting-section">
            <button id="theme-toggle" class="utility-btn">🌓 Switch Theme</button>
            <h1 id="clock">00:00:00</h1>
            <p id="date">Loading date...</p>
            <h2>
                <span id="greeting">Good Morning</span>,
                <span id="user-name" contenteditable="true">your name</span>!
            </h2>
        </header>

        <div class="widget timer-widget">
            <h2>Focus Timer</h2>
            <div id="timer-display">25:00</div>
            <div class="timer-settings">
                <label for="custom-minutes">Set Timer (mins): </label>
                <input type="number" id="custom-minutes" value="25" min="1" max="60">
            </div>
            <div class="timer-controls">
                <button id="start-btn">Start</button>
                <button id="stop-btn">Stop</button>
                <button id="reset-btn">Reset</button>
            </div>
        </div>

        <div class="widget quick-links-widget">
            <h2>Quick Links</h2>
            <form id="link-form">
                <input type="text" id="link-name" placeholder="Link name" required>
                <input type="text" id="link-url" placeholder="URL" required>
                <button type="submit" id="add-link-btn">Add Link</button>
            </form>
            <div id="links-container"></div>
        </div>

        <div class="widget tasks-widget">
            <div class="todo-header">
                <h2>To-Do List</h2>
                <span id="task-counter" class="task-counter"></span>
            </div>
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="What's next?" required>
                <button type="submit">Add</button>
            </form>
            <ul id="todo-list"></ul>
        </div>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
